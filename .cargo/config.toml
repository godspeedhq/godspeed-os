[target.x86_64-unknown-none]
rustflags = [
    "-C", "relocation-model=static",
]

# Build the kernel and services with:
#   cargo build -p kernel --target x86_64-unknown-none
#   cargo build -p godspeed-sdk --target x86_64-unknown-none
#   cargo build -p init --target x86_64-unknown-none
#
# Build the host tool with:
#   cargo build -p osdev
