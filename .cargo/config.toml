[target.x86_64-unknown-none]
rustflags = [
    "-C", "relocation-model=static",
]

# AArch64 variant (QEMU `virt`) - the arch-boundary demarcation test (docs/aarch64.md). The neutral
# kernel must compile for this target with ONLY arch/aarch64/ written; any error outside arch/aarch64/
# is a boundary leak. Build: cargo build -p kernel --target aarch64-unknown-none
[target.aarch64-unknown-none]
rustflags = [
    "-C", "relocation-model=static",
]

# Build the kernel and services with:
#   cargo build -p kernel --target x86_64-unknown-none
#   cargo build -p godspeed-sdk --target x86_64-unknown-none
#   cargo build -p init --target x86_64-unknown-none
#
# Build the host tool with:
#   cargo build -p osdev

# RISC-V variant (QEMU `virt`, S-mode via OpenSBI) - the THIRD arch, proving the boundary generalises.
# riscv64imac = integer-only (soft-float), so no FP-enable step. Build: cargo build -p kernel --target riscv64imac-unknown-none-elf
[target.riscv64imac-unknown-none-elf]
rustflags = [
    "-C", "relocation-model=static",
]

# LoongArch64 variant (QEMU `virt`) - the FOURTH arch. softfloat = no FP-enable step.
# Build: cargo build -p kernel --target loongarch64-unknown-none-softfloat
[target.loongarch64-unknown-none-softfloat]
rustflags = [
    "-C", "relocation-model=static",
]

# s390x variant (QEMU s390-ccw) - the FIFTH arch, and the first BIG-ENDIAN one.
# Build: cargo build -p kernel --target s390x-unknown-none-softfloat
[target.s390x-unknown-none-softfloat]
rustflags = [
    "-C", "relocation-model=static",
]

# riscv32 - a WORD-SIZE test (32-bit), not a clean bank. Reveals the kernel's 64-bit assumptions.
[target.riscv32imac-unknown-none-elf]
rustflags = ["-C", "relocation-model=static"]

# ARM 32-bit (word-size proof, compile-only).
[target.armv7a-none-eabi]
rustflags = ["-C", "relocation-model=static"]
