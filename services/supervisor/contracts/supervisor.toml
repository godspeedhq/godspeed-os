name    = "supervisor"
version = "0.1.0"

[resources.memory]
request = "8MiB"
limit   = "16MiB"

[capabilities]
# service_control is the exclusive restart/kill capability (§14.4).
service_control = true
log_write       = true
# supervisor reads service binaries and contracts from the filesystem.
ipc_send        = ["fs"]
ipc_receive     = ["supervisor"]

[placement]
core = 0
