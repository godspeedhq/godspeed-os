# services/.cargo/config.toml
#
# Overrides the workspace-root config for service crates.
# Services use their own user.ld (emitted by each service's build.rs) and
# must NOT inherit the kernel linker script (-Tkernel/kernel.ld).

[target.x86_64-unknown-none]
rustflags = [
    "-C", "relocation-model=static",
]
