name    = "init"
version = "0.1.0"

[resources.memory]
request = "4MiB"
limit   = "8MiB"

[capabilities]
# init spawns the supervisor + logger; the supervisor spawns registry and all the rest
# (naming Phase 3b, §11 — the supervisor owns naming, so it holds registry's cap).
spawn = ["supervisor", "logger"]
log_write = true

[placement]
core = 0
