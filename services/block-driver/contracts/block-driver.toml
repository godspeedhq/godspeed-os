name    = "block-driver"
version = "0.1.0"

[resources.memory]
request = "8MiB"
limit   = "16MiB"

[capabilities]
# block-driver is an AHCI (SATA) driver: it holds the HBA's MMIO window (ABAR) + a DMA arena. It
# DECLARES the device CLASS here; the kernel resolves the runtime-discovered BAR address by the PCI
# scan and grants MMIO/DMA accordingly (kernel `service_hw` / `HwClass::Ahci`, audit T1 Phase B). The
# class is reconciled against the kernel by scripts/contract_check.py, so contract and kernel cannot
# diverge (Commandment III); the BAR address stays the one runtime fact. (The retired ATA-PIO backend's
# `hw_pio` was removed - the contract no longer mis-states the driver's privilege.)
hw_device = "ahci"
log_write = true

[placement]
core = 1
