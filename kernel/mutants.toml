# cargo-mutants configuration - kernel crate.
#
# Only the five pure-logic modules in the lib target are mutated.
# Everything else either requires the no_std/hardware environment or
# is the bin entry point that cannot compile for the host.
#
# Mutated: capability/cap.rs, capability/generation.rs, capability/rights.rs,
#          ipc/message.rs, ipc/queue.rs
#
# Test command: cargo test -p kernel --lib
# Approximate run time: ~5-10 min (50-100 mutations × ~3 s each).
#
# NOTE: cargo-mutants matches exclude_globs against workspace-root-relative
# paths (kernel/src/...), so all patterns must use the kernel/src/ prefix.

timeout_multiplier = 5.0

exclude_globs = [
    "kernel/src/arch/**",
    "kernel/src/memory/**",
    "kernel/src/smp/**",
    "kernel/src/task/**",
    "kernel/src/syscall/**",
    "kernel/src/interrupt/**",
    "kernel/src/invariants/**",
    "kernel/src/ipc/endpoint.rs",
    "kernel/src/ipc/routing.rs",
    "kernel/src/ipc/names.rs",
    "kernel/src/ipc/mod.rs",
    "kernel/src/capability/table.rs",
    "kernel/src/capability/revoke.rs",
    "kernel/src/capability/mod.rs",
    "kernel/src/log.rs",
    "kernel/src/main.rs",
    "kernel/src/lib.rs",
    "kernel/src/loader.rs",
    "kernel/src/control.rs",
]
