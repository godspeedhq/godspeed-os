name: fuzz

on:
  workflow_dispatch:  # paused: re-add push/branches: [main] when CI minutes are available

# §22 Fuzz suite (H3). The bar is binary: the kernel must never panic on
# user-controllable input (random syscall args/numbers, malformed ELFs and
# contracts, random IPC bodies, forged embedded caps, random cap generations,
# pathological memory requests). Each scenario boots the kernel in a fuzz mode
# and asserts a clean "pass" line over serial.
#
# KVM is required: the brutal variant runs 200k+ syscall-number iterations and
# 5k-round IPC/cap fuzzing, which time out under TCG software emulation but
# complete comfortably with hardware virtualization. The identity workflow uses
# the same /dev/kvm setup.

jobs:
  fuzz:
    name: Fuzz test suite (§22 F1–F8, BF1–BF8)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Install QEMU and build tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y qemu-system-x86 gcc

      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm

      - name: Download and set up Limine
        run: |
          mkdir -p tools/limine
          curl -fsSL \
            https://github.com/limine-bootloader/limine/releases/download/v12.2.0/limine-binary.tar.gz \
            | tar -xz --strip-components=1 -C tools/limine
          make -C tools/limine limine
          chmod +x tools/limine/limine

      - name: Run fuzz tests (F1–F8)
        run: cargo run -p osdev -- test fuzz

      - name: Run brutal fuzz tests (BF1–BF8)
        run: cargo run -p osdev -- test fuzz-brutal

      - name: Upload serial logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-serial-logs-${{ github.sha }}
          path: build/tests/
