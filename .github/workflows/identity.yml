name: identity

on:
  workflow_dispatch:  # paused: re-add push/branches: [main] when CI minutes are available

jobs:
  identity:
    name: Identity test suite (§22)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Install QEMU and build tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y qemu-system-x86 gcc

      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm

      - name: Download and set up Limine
        run: |
          mkdir -p tools/limine
          curl -fsSL \
            https://github.com/limine-bootloader/limine/releases/download/v12.2.0/limine-binary.tar.gz \
            | tar -xz --strip-components=1 -C tools/limine
          make -C tools/limine limine
          chmod +x tools/limine/limine

      - name: Run identity tests
        run: cargo run -p osdev -- test identity

      - name: Upload serial logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: identity-serial-logs-${{ github.sha }}
          path: build/tests/
