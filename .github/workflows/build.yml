name: build

on:
  push:
  pull_request:

jobs:
  build:
    name: Build and lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Build (bare-metal)
        run: cargo build --target x86_64-unknown-none --workspace --exclude osdev

      - name: Build osdev (host)
        run: cargo build -p osdev

      - name: Clippy (bare-metal)
        run: cargo clippy --target x86_64-unknown-none --workspace --exclude osdev

      - name: Clippy (host)
        run: cargo clippy -p osdev

      - name: Validate service contracts
        run: cargo run -p osdev -- validate
