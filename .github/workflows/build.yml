name: build

on:
  workflow_dispatch:  # paused: re-add push/pull_request when CI minutes are available

jobs:
  build:
    name: Build and lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      # Services must be built before the kernel: kernel/build.rs embeds service
      # ELF bytes via include_bytes!(env!("SVC_*_ELF")), so the service binaries
      # must exist in target/ before the kernel crate compiles.
      - name: Build services (bare-metal)
        run: cargo build --target x86_64-unknown-none --workspace --exclude osdev --exclude kernel

      - name: Build kernel (bare-metal)
        run: cargo build --target x86_64-unknown-none -p kernel

      - name: Build osdev (host)
        run: cargo build -p osdev

      - name: Clippy services (bare-metal)
        run: cargo clippy --target x86_64-unknown-none --workspace --exclude osdev --exclude kernel

      - name: Clippy kernel (bare-metal)
        run: cargo clippy --target x86_64-unknown-none -p kernel

      - name: Clippy osdev (host)
        run: cargo clippy -p osdev

      - name: Validate service contracts
        run: cargo run -p osdev -- validate

      - name: Unsafe audit check
        run: python3 scripts/unsafe_check.py

      - name: Contract reconcile check (contract vs kernel service_config)
        run: python3 scripts/contract_check.py

      - name: Arch-boundary check (no arch-specific code in neutral layers)
        run: python3 scripts/arch_boundary_check.py

      - name: "Dash check (ASCII hyphen only, CLAUDE.md section 21)"
        run: python3 scripts/dash_check.py

      - name: Unit tests (kernel pure-logic)
        run: python3 scripts/test_report.py

  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-tools-${{ runner.os }}-v1

      - name: Security audit (cargo-audit)
        run: |
          cargo install cargo-audit --locked 2>/dev/null || true
          cargo audit

      - name: Miri - kernel pure-logic
        env:
          # proptest's FileFailurePersistence calls getcwd; disable Miri's
          # filesystem isolation so it can resolve the path without aborting.
          MIRIFLAGS: -Zmiri-disable-isolation
          # Miri is ~100-1000x slower than native. Set cases to 1 per
          # property - enough for UB detection. Full 256 cases run in the
          # regular cargo test step.
          PROPTEST_CASES: 1
        run: cargo miri test -p kernel --lib

      - name: Unsafe surface report (cargo-geiger)
        run: |
          cargo install cargo-geiger --locked 2>/dev/null || true
          cd kernel && cargo geiger 2>&1 || true
