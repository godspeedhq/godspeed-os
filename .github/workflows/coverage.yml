name: coverage

on:
  workflow_dispatch:  # paused: re-add push/branches: [main] when CI minutes are available

jobs:
  coverage:
    name: Code coverage (kernel pure-logic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Generate coverage report
        run: |
          mkdir -p build
          cargo llvm-cov --package kernel \
            --lcov --output-path build/coverage.lcov
          cargo llvm-cov --package kernel \
            --html --output-dir build/coverage-html

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: build/coverage-html/

      - name: Print coverage summary
        run: cargo llvm-cov --package kernel --summary-only
