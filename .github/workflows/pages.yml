# Regenerate and deploy the GodspeedOS documentation site on every change to the
# source of truth. The site is a DERIVED VIEW (mdBook {{#include}} stubs + rustdoc);
# this workflow IS the reconcile step - push a change to CLAUDE.md / COMMANDMENTS.md /
# docs / the SDK and the published site rebuilds from it automatically.
#
# One-time setup at launch: repo Settings -> Pages -> Source = "GitHub Actions",
# and set git-repository-url in website/book.toml once the org/repo names are final.
name: docs

on:
  push:
    branches: [main]
    paths:
      - "CLAUDE.md"
      - "COMMANDMENTS.md"
      - "GLOSSARY.md"
      - "CONTRIBUTING.md"
      - "docs/**"
      - "milestones/ALMANAC.md"
      - "sdk/**"
      - "website/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; do not cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        env:
          MDBOOK_VERSION: "0.4.40"
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build the book (mdBook - includes pull the source of truth)
        run: cd website && mdbook build

      # rustdoc for the SDK, published under /api. Best-effort for now: the SDK is
      # no_std on a bare-metal target, so if the doc build needs toolchain tuning this
      # step is allowed to fail WITHOUT blocking the book deploy. continue-on-error
      # keeps the failure VISIBLE in the Actions UI (not silent). Harden once live.
      - name: Build SDK API docs (rustdoc)
        id: rustdoc
        continue-on-error: true
        run: |
          rustup target add x86_64-unknown-none || true
          cargo doc -p godspeed-sdk --no-deps --target x86_64-unknown-none

      - name: Assemble site (book + /api)
        run: |
          if [ -d target/x86_64-unknown-none/doc ]; then
            mkdir -p website/book/api && cp -r target/x86_64-unknown-none/doc/* website/book/api/
          elif [ -d target/doc ]; then
            mkdir -p website/book/api && cp -r target/doc/* website/book/api/
          else
            echo "no rustdoc output this run - shipping the book without /api"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
