# GodspeedOS documentation site (mdBook).
#
# This book contains almost NO CONTENT OF ITS OWN. Every chapter that shows the
# constitution, a commandment, the glossary, the almanac, or a design doc is a
# two-line {{#include}} stub that pulls the real file from the repo at build time.
# The source of truth stays where it lives (CLAUDE.md, COMMANDMENTS.md, docs/, ...);
# this book is a DERIVED VIEW of it, reconciled on every build (Commandment III).
# Do not paste content into these pages - edit the source file and rebuild.
[book]
title = "GodspeedOS"
description = "A capability-based microkernel OS. Small enough to understand. Rigorous enough to trust."
authors = ["Bankole Ogundero and the GodspeedOS contributors"]
language = "en"
src = "src"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/godspeedhq/godspeed-os"
# edit-url is deliberately omitted: the included pages are {{#include}} stubs, so an
# "edit this page" link would point at the stub, not the real source. The repo link
# (git-repository-url, above) is enough.

[output.html.fold]
enable = true
level = 1

# Rewrite repo-relative links inside included docs (CLAUDE.md, docs/*.md) so they
# resolve within the book instead of 404ing. Runs after {{#include}} expansion.
# See website/link-fixup.py. Needs `python` on PATH (CI uses actions/setup-python).
[preprocessor.godspeed-links]
command = "python link-fixup.py"
after = ["links"]
